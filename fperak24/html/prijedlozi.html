  <main>
    <article>
      <h2>Pošaljite prijedlog</h2>
      <form id="obrazac_prijedloga" action="https://spider.foi.hr/OWT/materijali/ispis_forme.php" method="post">
        <label for="input_naziv">Naziv lokaliteta:</label>
        <input id="input_naziv" type="text" name="naziv" required><br><br>

        <label for="input_mail">Email:</label>
        <input id="input_mail" type="email" name="email"><br><br>

        <label for="input_godina">Godina nastanka (otprilike):</label>
        <input id="input_godina" type="number" name="godina"><br><br>

        <label for="input_datum">Datum posjeta:</label>
        <input id="input_datum" type="date" name="datum"><br><br>

        <div id="radio_grupa_vrsta">
          <label>Vrsta objekta:</label><br>
          <label for="radio_dvorac">Dvorac</label>
          <input id="radio_dvorac" type="radio" name="vrsta" value="dvorac">

          <label for="radio_kurija">Kurija</label>
          <input id="radio_kurija" type="radio" name="vrsta" value="kurija">

          <label for="radio_utvrda">Utvrda</label>
          <input id="radio_utvrda" type="radio" name="vrsta" value="utvrda">
        </div><br><br>

        <div id="stanje_objekta_grupa">
          <label for="range_stanje">Očuvanost objekta (od 1 do 10):</label><br>
          <input type="range" min="1" max="10" id="range_stanje" name="stanje_objekta">
        </div>
        <br>

        <div id="stil_gradnje_grupa">
          <label>Stil gradnje:</label><br>
          <label for="check_klasik">Klasicizam</label>
          <input id="check_klasik" type="checkbox" name="stil[]" value="klasik">

          <label for="check_barok">Barok</label>
          <input id="check_barok" type="checkbox" name="stil[]" value="barok">

          <label for="check_gotika">Gotika</label>
          <input id="check_gotika" type="checkbox" name="stil[]" value="gotika">

          <label for="check_romanika">Romanika</label>
          <input id="check_romanika" type="checkbox" name="stil[]" value="romanika">
        </div> <br>

        <label for="odabir_lokacija">Lokacija:</label>
        <select id="odabir_lokacija" name="lokacija">
          <option value="varazdin">Varaždin</option>
          <option value="ivanec">Ivanec</option>
          <option value="lepoglava">Lepoglava</option>
          <option value="novi_marof">Novi Marof</option>
        </select><br><br>

        <label for="tekst_opis">Opis:</label><br>
        <textarea id="tekst_opis" name="opis"></textarea><br><br>

        <label for="input_slika">Slika lokaliteta:</label>
        <input id="input_slika" type="file" name="datoteka"><br><br>

        <label for="tekst_koordinate">Koordinate:</label>
        <input id="tekst_koordinate" type="text" name="koordinate"><br><br>

        <input type="submit" value="Pošalji">
        <input type="reset" value="Resetiraj">
      </form>
